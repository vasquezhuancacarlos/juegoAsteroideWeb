<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meteoritos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="titulo">☄️ Meteoritos</div>  
  <div id="hud">
    <div>Puntos: <span class="val" id="h-score">0</span></div>
    <div>Nivel: <span class="val" id="h-level">1</span></div>
    <div>Récord: <span class="val" id="h-best">0</span></div>
    <div id="h-lives">❤️ ❤️ ❤️</div>
  </div>

  <canvas id="gameCanvas" width="480" height="600"></canvas>

  <div id="controles">
    <b>↑ ↓ ← →</b> Mover &nbsp;|&nbsp; <b>Espacio</b> Disparar &nbsp;|&nbsp; <b>P</b> Pausa
  </div>
  <div id="commit-label">Semana 7 — Nave con movimiento libre en 4 direcciones</div>

  <script src="game.js"></script>
</body>
</html>
